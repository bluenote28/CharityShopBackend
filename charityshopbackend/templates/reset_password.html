<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    {% block head %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>{% block title %}{% endblock %} Password Reset</title>
    {% endblock %}
</head>

<style>
    p, h3 { text-align: center;}
    h2 { text-align: center; color: white;}
    .form-row { display: flex; flex-direction: row;}
    header { background-color: rgb(19, 6, 212); height: 100px; align-items: center; display: flex; justify-content: center;}
    footer { background-color: rgb(19, 6, 212); width: "100%"; position: fixed; bottom: 0; right: 0; left: 0;}
</style>

<header>
  <h2>Reset Password</h2>
</header>

<div class="d-flex flex-column">

<h3 class="mt-5">Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.</h3>

<div class="container d-flex justify-content-center mt-4">
    <div class="row">
        <div class="col">
        <form method="POST">
            {% csrf_token %}
            {{form}}
            <input type="submit" class="btn btn-primary mt-2 mx-5"/>
        </form>
        </div>
    </div>
</div>

</div>

<footer class='d-flex justify-content-center mt-auto'>
 <img src="{% static 'images/footerlogo.png' %}" alt="Charity Shop USA Logo" class="img-fluid"> 
</footer>
